steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-west1-docker.pkg.dev/$PROJECT_ID/pourhouse-repo/pourhouse:$COMMIT_SHA',
      '.'
    ]

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-west1-docker.pkg.dev/$PROJECT_ID/pourhouse-repo/pourhouse:$COMMIT_SHA']

  # Step 3: Deploy the new image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pourhouse'
      - '--image'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/pourhouse-repo/pourhouse:$COMMIT_SHA'
      - '--region'
      - 'us-west1'

options:
  logging: CLOUD_LOGGING_ONLY
