<div id="pourhouse-display-root">
  <p style="text-align: center; color: #666; font-family: sans-serif; letter-spacing: 1px;">Opening the cellar...</p>
</div>

<script>
(function() {
  const root = document.getElementById('pourhouse-display-root');

  // UPDATED TO OREGON (US-WEST1) URL
  const API_URL = 'https://pourhouse-779220128919.us-west1.run.app/api/wines';

  async function fetchWines() {
    try {
      const response = await fetch(API_URL, {
        method: 'GET',
        mode: 'cors', // Explicitly request CORS
        headers: {
          'Accept': 'application/json'
        }
      });

      if (!response.ok) {
        const errorDetail = await response.text();
        throw new Error(`Syncing: ${response.status}`);
      }

      const wines = await response.json();

      if (!wines || wines.length === 0) {
        root.innerHTML = "<p style='text-align:center; font-style:italic;'>Our wine list is currently being updated. Please check back shortly!</p>";
        return;
      }

      let html = '<div class="ph-grid">';
      wines.forEach(wine => {
        html += `
          <div class="ph-wine-card">
            <div class="ph-header">
              <span class="ph-name">${wine.name}</span>
              <span class="ph-price">$${wine.price || ''}</span>
            </div>
            <p class="ph-meta">${wine.varietal || ''} — ${wine.region || ''}</p>
          </div>
        `;
      });
      html += '</div>';
      root.innerHTML = html;

    } catch (err) {
      console.error('Pourhouse Sync Error:', err);
      // Fallback message for visitors if the API is still handshaking
      root.innerHTML = `<div style="text-align:center; color: #999; font-size: 13px; padding: 40px 20px; border-top: 1px solid #eee;">
        Our live cellar list is currently updating. <br>Please see our menu at the bar for today's full selection.
      </div>`;
    }
  }

  fetchWines();
})();
</script>

<style>
  .ph-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
    padding: 20px 0;
  }
  @media (min-width: 768px) {
    .ph-grid { grid-template-columns: 1fr 1fr; gap: 40px; }
  }
  .ph-wine-card {
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 15px;
    font-family: "proxima-nova", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  .ph-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-weight: 600;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 1.1rem;
  }
  .ph-name { flex: 1; padding-right: 10px; }
  .ph-price { color: #4a0e0e; }
  .ph-meta {
    font-style: italic;
    color: #777;
    font-size: 0.95rem;
    margin-top: 8px;
    font-weight: 300;
  }
</style>
